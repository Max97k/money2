# .github/workflows/release.yml

name: Build and Release to Google Play

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g., 1.0.0)'
        required: false
        default: ''

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. Checkout 程式碼
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 取得完整歷史以支援 tag 操作

      # 2. 設定 Java 環境
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 設定 Gradle 快取
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. 給予 Gradle wrapper 執行權限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. 解碼 Keystore 並驗證
      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore
          # 驗證 keystore 檔案是否正確解碼
          if [ ! -s app/release.keystore ]; then
            echo "::error::Keystore file is empty or was not created. Check ANDROID_KEYSTORE_BASE64 secret."
            exit 1
          fi
          echo "✅ Keystore decoded successfully ($(wc -c < app/release.keystore) bytes)"

      # 6. 決定版本號
      - name: Determine version
        id: version
        run: |
          # 使用 run_number 作為 versionCode
          VERSION_CODE=${{ github.run_number }}
          
          # 版本名稱優先順序：手動輸入 > tag 名稱 > 預設值
          if [ -n "${{ github.event.inputs.version_name }}" ]; then
            VERSION_NAME="${{ github.event.inputs.version_name }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION_NAME="${{ github.ref_name }}"
            VERSION_NAME="${VERSION_NAME#v}"  # 移除 'v' 前綴
          else
            VERSION_NAME="1.0.0"
          fi
          
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "📦 Building version $VERSION_NAME ($VERSION_CODE)"

      # 7. 執行 Gradle 建置
      - name: Build with Gradle
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -PversionCode=${{ steps.version.outputs.version_code }} \
            -PversionName=${{ steps.version.outputs.version_name }}

      # 8. 驗證 AAB 已正確產生
      - name: Verify AAB output
        run: |
          AAB_PATH="app/build/outputs/bundle/release/app-release.aab"
          if [ ! -f "$AAB_PATH" ]; then
            echo "::error::AAB file not found at $AAB_PATH"
            exit 1
          fi
          AAB_SIZE=$(wc -c < "$AAB_PATH")
          echo "✅ AAB generated successfully ($AAB_SIZE bytes)"

      # 9. 建立 GitHub Release 並上傳 AAB
      - name: Create GitHub Release and Upload AAB
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ steps.version.outputs.version_name }}
          draft: false
          prerelease: false
          files: app/build/outputs/bundle/release/app-release.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 10. 上傳到 Google Play Console
      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.mymoney2.app
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          tracks: internal
          status: completed
